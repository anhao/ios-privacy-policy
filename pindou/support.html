<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>拼豆设计器技术支持</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f3ed;
        --card: #fffdf9;
        --text: #2d241d;
        --muted: #6f6257;
        --line: #e6ddd2;
        --accent: #b87743;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
        background: linear-gradient(180deg, #f8f4ee 0%, #f3ede4 100%);
        color: var(--text);
        line-height: 1.7;
      }

      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 40px 20px 80px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 32px 24px;
        box-shadow: 0 12px 30px rgba(75, 55, 36, 0.06);
      }

      h1,
      h2 {
        margin: 0 0 16px;
        line-height: 1.3;
      }

      h1 {
        font-size: 32px;
      }

      h2 {
        margin-top: 32px;
        font-size: 22px;
      }

      p,
      li {
        font-size: 16px;
      }

      .meta,
      .note {
        color: var(--muted);
      }

      ul {
        padding-left: 20px;
      }

      a {
        color: var(--accent);
      }

      .footer {
        margin-top: 32px;
        padding-top: 20px;
        border-top: 1px solid var(--line);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>拼豆设计器技术支持</h1>
        <p class="meta">应用版本：1.0.0</p>
        <p>
          欢迎使用拼豆设计器。如果你在使用过程中遇到问题，或希望反馈建议、提交功能需求，可以通过以下方式联系我们。
        </p>

        <h2>常见问题</h2>
        <ul>
          <li>无法打开相机或相册：请检查系统是否已授予相机和照片访问权限。</li>
          <li>导出失败：请确认系统是否允许应用保存图片到相册。</li>
          <li>图片转拼豆效果不理想：建议尝试更清晰的原图，或在编辑器中手动微调颜色与细节。</li>
          <li>看不到历史项目：请确认应用未被系统清理本地数据。</li>
        </ul>

        <h2>联系我们</h2>
        <ul>
          <li>应用名称：拼豆设计器</li>
          <li>支持邮箱：<a href="mailto:im@alone88.cn">im@alone88.cn</a></li>
        </ul>

        <h2>隐私说明</h2>
        <p>
          如需查看隐私政策，请访问
          <a href="./privacy-policy-ios.html">拼豆设计器隐私政策</a>。
        </p>

        
      </section>
    </main>
  </body>
</html>
